<mat-drawer-container autosize>
  <mat-drawer #drawer class="menu-opened" mode="over">
    <button mat-button (click)="drawer.close()">Fermer</button>
    <div *ngFor="let tournament of integrationData.value.tournaments" (click)="selectTournament(tournament);">
      {{tournament.name}}
    </div>
  </mat-drawer>

  <div class="menu-closed" (click)="drawer.toggle()">
    <mat-icon>menu</mat-icon>
  </div>
  <div class="content">
    <app-table [data]="integrationData.value"></app-table>
    <app-matches [data]="integrationData.value" [tournament]="tournament"></app-matches>
    <!--  <app-schedule [data]="integrationData.value"></app-schedule>-->
  </div>

</mat-drawer-container>

<mat-toolbar color="primary">
  <div class="refresh-container" (click)="updateData()">
    Last update : {{integrationData.value.date | date:'HH\'h\'mm' }}
    <mat-icon color="primary">refresh</mat-icon>
    Refresh
  </div>
  <app-tournament [data]="integrationData.value" (launchIntegration)="updateData()"></app-tournament>
</mat-toolbar>


<router-outlet></router-outlet>
